version: '3.8'

services:
  mysql_server:
    image: mysql:8.0
    container_name: mysql_smartfenix_new
    ports:
      - "3308:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root1234
      - MYSQL_DATABASE=smartfenix_db
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./mysql_data:/var/lib/mysql

  phpmyadmin_web:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin_smartfenix_new
    ports:
      - "8098:80"
    environment:
      - PMA_HOST=mysql_server
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=root1234
    depends_on:
      - mysql_server
